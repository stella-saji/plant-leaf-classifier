<!DOCTYPE html>
<html>
<head>
    <title>Leaf Classifier</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            font-family: "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 50px;
            width: 500px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            animation: fadeIn 0.8s ease;
        }

        h1 {
            font-size: 36px;
            color: #2e7d32;
            margin-bottom: 5px;
        }

        .author {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
        }

        .features {
            text-align: left;
            margin: 30px 0;
        }

        .features li {
            margin: 12px 0;
            font-size: 16px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 40px;
            background: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 18px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🌿 Leaf Classifier</h1>
    <div class="author">— by <strong>Stella Saji</strong></div>

    <ul class="features">
        <li>🍃 Classifies leaf images using AI</li>
        <li>🌱 Detects <strong>Mango, Neem, Tulsi</strong></li>
        <li>❓ Handles unknown or non-leaf images</li>
        <li>📊 Shows confidence for every prediction</li>
    </ul>

   <form action="/predict" method="get">
    <button type="submit">Get Started →</button>
   </form>

</div>

</body>
</html>
